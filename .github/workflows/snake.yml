name: Generate Snake Animation

on:
  # Regenerate daily so the snake stays current
  schedule:
    - cron: "0 0 * * *"
  # Run on every push to main (so it generates right after setup)
  push:
    branches:
      - main
  # Allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate the snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: UsmanShahab18
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%238a2be2

      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
